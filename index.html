        <button id="mb8-${safeKey}-${day}" onclick="modalShiftToggle('${safeKey}','${day}','8')"
          style="padding:2px 10px;border-radius:5px;border:1px solid ${ms==='8'?'var(--green)':'var(--border)'};
          background:${ms==='8'?'rgba(63,185,80,.2)':'var(--bg)'};color:${ms==='8'?'var(--green)':'var(--muted)'};
          font-size:.75rem;cursor:pointer;font-family:inherit">08–17</button>
        <button id="mb9-${safeKey}-${day}" onclick="modalShiftToggle('${safeKey}','${day}','9')"
          style="padding:2px 10px;border-radius:5px;border:1px solid ${ms==='9'?'var(--accent)':'var(--border)'};
          background:${ms==='9'?'rgba(88,166,255,.2)':'var(--bg)'};color:${ms==='9'?'var(--accent)':'var(--muted)'};
          font-size:.75rem;cursor:pointer;font-family:inherit">09–18</button>
      </div>`;
    }

    return `<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 8px;background:var(--bg);border-radius:7px;margin-bottom:4px">
      <span style="color:var(--muted);font-size:.78rem;min-width:60px;padding-top:6px;flex-shrink:0">יום ${day}<br><span style="font-size:.68rem">${WEEK_DATES[day].label}</span></span>
      <div style="flex:1">
        <select class="csel v-${val}" id="ms-${safeKey}-${day}"
          onchange="modalSelChange('${safeKey}','${day}',this)" style="width:100%;max-width:none">${opts}</select>
        <div id="mtcell-${safeKey}-${day}">${timeH}</div>
        ${shiftToggleH}
      </div>
    </div>`;
  }).join('');

  document.getElementById('editModalBody').innerHTML = `
    ${rows}
    <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn btn-sm" style="background:var(--s2);color:var(--muted)" onclick="closeScheduleEdit()">ביטול</button>
      <button class="btn btn-sm btn-primary" onclick="saveModalEdit('${safeKey}', false)">💾 שמור</button>
      <button class="btn btn-sm btn-success" onclick="saveModalEdit('${safeKey}', true)">💾 שמור ואשר</button>
    </div>`;

  document.getElementById('editModal').style.display = 'flex';
}

function modalSelChange(safeKey, day, sel) {
  sel.className = 'csel v-'+sel.value;
  const cell = document.getElementById('mtcell-'+safeKey+'-'+day);
  if (!cell) return;
  const v = sel.value;
  if (v==='late')       cell.innerHTML = `<div class="time-cell"><span class="time-lbl" style="color:var(--warn)">משעה:</span><input class="time-inp" type="time" min="08:00" max="18:00" id="me-${safeKey}-${day}"/></div>`;
  else if (v==='early') cell.innerHTML = `<div class="time-cell"><span class="time-lbl" style="color:var(--green)">עד שעה:</span><input class="time-inp" type="time" min="08:00" max="18:00" id="me-${safeKey}-${day}"/></div>`;
  else                  cell.innerHTML = '';
}

function modalShiftToggle(safeKey, day, shift) {
  const agent = localAgents.find(a => a.key.replace(/[\s']/g,'_') === safeKey);
  if (!agent) return;
  if (!agent.managerShift) agent.managerShift = {};
  agent.managerShift[day] = (agent.managerShift[day] === shift) ? '' : shift;
  // update button styles live
  const btn8 = document.getElementById(`mb8-${safeKey}-${day}`);
  const btn9 = document.getElementById(`mb9-${safeKey}-${day}`);
  const ms = agent.managerShift[day];
  if (btn8) { btn8.style.borderColor = ms==='8'?'var(--green)':'var(--border)'; btn8.style.background = ms==='8'?'rgba(63,185,80,.2)':'var(--bg)'; btn8.style.color = ms==='8'?'var(--green)':'var(--muted)'; }
  if (btn9) { btn9.style.borderColor = ms==='9'?'var(--accent)':'var(--border)'; btn9.style.background = ms==='9'?'rgba(88,166,255,.2)':'var(--bg)'; btn9.style.color = ms==='9'?'var(--accent)':'var(--muted)'; }
}

async function saveModalEdit(safeKey, andApprove) {
  showLoading('שומר...');
  try {
    const agent = localAgents.find(a => a.key.replace(/[\s']/g,'_') === safeKey);
    if (!agent) return;
    DAYS.forEach(day => {
      const sel  = document.getElementById(`ms-${safeKey}-${day}`);
      const tinp = document.getElementById(`me-${safeKey}-${day}`);
      agent.constraints[day] = { type: sel ? sel.value : 'none', time: tinp ? tinp.value : '' };
    });
    // managerShift is already updated live by modalShiftToggle
    agent.submitted = true;
    if (andApprove) agent.approved = true;
    await saveAgents(localAgents);
    closeScheduleEdit();
    generateAndRender(true);
    await renderMgAgents();
    updatePendingBadge();
  } catch(e) { alert('שגיאה: ' + e.message); }
  finally { hideLoading(); }
}

function closeScheduleEdit() {
  document.getElementById('editModal').style.display = 'none';
  document.getElementById('editModalBody').innerHTML = '';
}

// ══════════════════════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════════════════════
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('moked_history') || '[]'); } catch(e){ return []; }
}
function saveHistory(arr) { localStorage.setItem('moked_history', JSON.stringify(arr.slice(-12))); } // שמור עד 12 שבועות

function saveToHistory(sched, pool, actFilter) {
  if (!actFilter) return; // שמור רק כשנבחרת פעילות ספציפית
  const hist = loadHistory();
  const weekKey = WEEK_DATES['ראשון'].label + '–' + WEEK_DATES['שישי'].label;
  // הסר רשומה קיימת לאותו שבוע+פעילות
  const filtered = hist.filter(h => !(h.week === weekKey && h.activity === actFilter));
  filtered.push({
    week: weekKey,
    activity: actFilter,
    date: new Date().toLocaleDateString('he-IL'),
    agentCount: pool.length,
    snapshot: DAYS.map(day => ({
      day,
      shift8:   sched[day].shift8.map(a=>a.name),
      shift9:   sched[day].shift9.map(a=>a.name),
      digital8: sched[day].digital8.map(a=>a.name),
      digital9: sched[day].digital9.map(a=>a.name),
      dayOff:   sched[day].dayOff.map(a=>a.name),
    }))
  });
  saveHistory(filtered);
}

function renderHistory() {
  const pane = document.getElementById('mgHistoryPane');
  const hist = loadHistory();
  if (!hist.length) {
    pane.innerHTML = `<div class="empty"><div class="ico">📚</div><p>אין היסטוריה עדיין. צור סידור עבודה לפעילות ספציפית.</p></div>`;
    return;
  }
  const cards = [...hist].reverse().map(h => {
    const actC = actColor(h.activity);
    const rows = h.snapshot.map(s => {
      const all = [...s.shift8, ...s.shift9, ...s.digital8, ...s.digital9];
      return `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem">
        <span style="color:var(--muted);min-width:50px">יום ${s.day}</span>
        <span style="color:var(--text)">${all.join(', ') || '—'}</span>
        ${s.dayOff.length ? `<span style="color:var(--danger);margin-right:auto">🏖 ${s.dayOff.join(', ')}</span>` : ''}
      </div>`;
    }).join('');
    return `<div class="card" style="border-color:${actC.border}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <span style="background:${actC.bg};border:1px solid ${actC.border};color:${actC.text};border-radius:20px;padding:3px 12px;font-size:.82rem;font-weight:700">🏷 ${h.activity}</span>
        <span style="color:var(--muted);font-size:.83rem">📅 ${h.week}</span>
        <span style="color:var(--muted);font-size:.78rem">נוצר: ${h.date}</span>
        <span style="color:var(--muted);font-size:.78rem">${h.agentCount} נציגים</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
  pane.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <h3 style="font-size:1rem;font-weight:700">📚 היסטוריית סידורים (${hist.length} שבועות)</h3>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('למחוק את כל ההיסטוריה?')){localStorage.removeItem('moked_history');renderHistory();}">🗑 נקה הכל</button>
    </div>
    ${cards}`;
}

// ══════════════════════════════════════════════════════════
//  STATISTICS
// ══════════════════════════════════════════════════════════
function renderStats() {
  const pane  = document.getElementById('mgStatsPane');
  const all   = localAgents;
  if (!all.length) {
    pane.innerHTML = `<div class="empty"><div class="ico">📊</div><p>אין נתונים עדיין</p></div>`;
    return;
  }

  // סטטיסטיקות לפי פעילות
  const byActivity = {};
  ACTIVITIES.forEach(a => byActivity[a] = { total:0, submitted:0, approved:0, offDays:0, lateDays:0, earlyDays:0 });
  all.forEach(agent => {
    const a = agent.activity;
    if (!byActivity[a]) return;
    byActivity[a].total++;
    if (agent.submitted) byActivity[a].submitted++;
    if (agent.approved)  byActivity[a].approved++;
    DAYS.forEach(day => {
      const c = agent.constraints[day]||{type:'none'};
      if (c.type==='off')   byActivity[a].offDays++;
      if (c.type==='late')  byActivity[a].lateDays++;
      if (c.type==='early') byActivity[a].earlyDays++;
    });
  });

  const actCards = ACTIVITIES.map(act => {
    const s = byActivity[act];
    if (!s.total) return '';
    const ac = actColor(act);
    const submitPct = s.total ? Math.round(s.submitted/s.total*100) : 0;
    return `<div class="card" style="border-color:${ac.border}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="background:${ac.bg};border:1px solid ${ac.border};color:${ac.text};border-radius:20px;padding:3px 12px;font-size:.82rem;font-weight:700">${act}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.83rem">
        <div style="background:var(--s2);border-radius:7px;padding:8px 12px">👥 נציגים: <strong style="color:${ac.text}">${s.total}</strong></div>
        <div style="background:var(--s2);border-radius:7px;padding:8px 12px">✅ הגישו: <strong style="color:var(--green)">${s.submitted}</strong></div>
        <div style="background:var(--s2);border-radius:7px;padding:8px 12px">🏖 ימי חופש: <strong style="color:var(--danger)">${s.offDays}</strong></div>
        <div style="background:var(--s2);border-radius:7px;padding:8px 12px">🌙 התחלות מאוחרות: <strong style="color:var(--warn)">${s.lateDays}</strong></div>
      </div>
      <div style="margin-top:10px;background:var(--s2);border-radius:6px;height:8px;overflow:hidden">
        <div style="height:100%;background:${ac.hex};width:${submitPct}%;border-radius:6px;transition:width .4s"></div>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:4px">${submitPct}% הגישו אילוצים</div>
    </div>`;
  }).join('');

  // סטטיסטיקות כלליות
  const totalAgents = all.length;
  const submitted = all.filter(a=>a.submitted).length;
  const approved  = all.filter(a=>a.approved).length;
  const totalOff  = all.reduce((s,a) => s + DAYS.filter(d => a.constraints?.[d]?.type==='off').length, 0);

  pane.innerHTML = `
    <div class="stats-bar">
      <div class="stat-chip">👥 סה"כ נציגים: <span>${totalAgents}</span></div>
      <div class="stat-chip">📨 הגישו: <span>${submitted}</span></div>
      <div class="stat-chip">✅ מאושרים: <span>${approved}</span></div>
      <div class="stat-chip">🏖 סה"כ ימי חופש: <span>${totalOff}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
      ${actCards || '<div style="color:var(--muted)">אין נתונים</div>'}
    </div>`;
}

// ══════════════════════════════════════════════════════════
//  EXCEL EXPORT
// ══════════════════════════════════════════════════════════
function exportToExcel() {
  if (!lastBuiltSched) { alert('יש ליצור סידור עבודה תחילה'); return; }
  const { sched, pool, actFilter } = lastBuiltSched;
  const title = actFilter || 'כל הפעילויות';
  const weekStr = WEEK_DATES['ראשון'].label + ' – ' + WEEK_DATES['שישי'].label;

  const makeRow = (label, key) => {
    const row = [label];
    DAYS.forEach(day => { row.push(sched[day][key].map(a=>a.name).join(', ') || '—'); });
    return row;
  };

  const rows = [];
  rows.push(['סידור עבודה – ' + title]);
  rows.push(['שבוע: ' + weekStr]);
  rows.push([]);
  rows.push(['משמרת', ...DAYS.map(d => 'יום ' + d + ' ' + WEEK_DATES[d].label)]);
  rows.push(makeRow('שיחות 08-17', 'shift8'));
  rows.push(makeRow('שיחות 09-18', 'shift9'));
  if (actFilter === 'מובמנט') {
    rows.push(makeRow('דיגיטל 08-17', 'digital8'));
    rows.push(makeRow('דיגיטל 09-18', 'digital9'));
  }
  rows.push(makeRow('חופש', 'dayOff'));
  rows.push([]);
  const takanRow = ['תקנים'];
  DAYS.forEach(d => { takanRow.push(Math.round((sched[d].takanim?.total||0)*100)/100); });
  rows.push(takanRow);

  const esc = (c) => '"' + String(c).replace(/"/g, '""') + '"';
  const csvContent = rows.map(r => r.map(esc).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'סידור_' + title + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shuffleArray(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
}
